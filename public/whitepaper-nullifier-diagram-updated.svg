      .main { fill:#f3f7ff; font:600 32px 'Inter','Segoe UI',sans-serif; }
      .sub { fill:#31ddd6; font:500 21px 'Inter','Segoe UI',sans-serif; }
      .formula { fill:#48e8e0; font:600 21px 'JetBrains Mono','Consolas',monospace; }
    </style>
  </defs>

  <rect width="1600" height="520" fill="url(#bgN)"/>
  <g opacity="0.18" stroke="#1e2a3d" stroke-width="1">
    <path d="M0 40H1600M0 80H1600M0 120H1600M0 160H1600M0 200H1600M0 240H1600M0 280H1600M0 320H1600M0 360H1600M0 400H1600M0 440H1600M0 480H1600"/>
    <path d="M40 0V520M80 0V520M120 0V520M160 0V520M200 0V520M240 0V520M280 0V520M320 0V520M360 0V520M400 0V520M440 0V520M480 0V520M520 0V520M560 0V520M600 0V520M640 0V520M680 0V520M720 0V520M760 0V520M800 0V520M840 0V520M880 0V520M920 0V520M960 0V520M1000 0V520M1040 0V520M1080 0V520M1120 0V520M1160 0V520M1200 0V520M1240 0V520M1280 0V520M1320 0V520M1360 0V520M1400 0V520M1440 0V520M1480 0V520M1520 0V520M1560 0V520"/>
